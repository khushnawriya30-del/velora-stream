name: Build & Release APK

on:
  push:
    tags:
      - 'v*'           # Triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # Allow manual trigger from GitHub UI
    inputs:
      version:
        description: 'Version number (e.g. 1.2.3)'
        required: true
        default: '1.0.0'
      release_notes:
        description: "What's new in this version (shown in the in-app update popup)"
        required: false
        default: ''

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Update version in build.gradle.kts
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BUILD_NUM="${{ github.run_number }}"
          sed -i "s/versionName = \".*\"/versionName = \"$VERSION\"/" android/app/build.gradle.kts
          sed -i "s/versionCode = [0-9]*/versionCode = $BUILD_NUM/" android/app/build.gradle.kts

      # --- Signed release build (requires keystore secrets) ---
      - name: Decode keystore (if available)
        if: secrets.KEYSTORE_BASE64 != ''
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
        continue-on-error: true

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/android/app/keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/VELORA-v${VERSION}.apk

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', steps.version.outputs.VERSION) || github.ref_name }}
          name: "VELORA v${{ steps.version.outputs.VERSION }}"
          body: |
            ## VELORA v${{ steps.version.outputs.VERSION }}

            Download the APK below and install on your Android device.
            Enable **"Install from unknown sources"** in settings if prompted.

            **Minimum Android:** 7.0 (API 24)
          files: android/app/build/outputs/apk/release/VELORA-v${{ steps.version.outputs.VERSION }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update in-app version info on backend
        continue-on-error: true
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BUILD_NUM="${{ github.run_number }}"
          APK_URL="https://github.com/khushnawriya30-del/velora-stream/releases/download/v${VERSION}/VELORA-v${VERSION}.apk"
          BACKEND_URL="https://wxte3hgv2e.ap-south-1.awsapprunner.com/api/v1"

          # Determine release notes
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_notes }}" ]]; then
            NOTES="${{ github.event.inputs.release_notes }}"
          else
            NOTES="Version ${VERSION} is now available with new improvements."
          fi

          # Login to get admin JWT
          TOKEN=$(curl -s -X POST "${BACKEND_URL}/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"${{ secrets.ADMIN_EMAIL }}\",\"password\":\"${{ secrets.ADMIN_PASSWORD }}\"}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('accessToken',''))")

          if [ -z "$TOKEN" ]; then
            echo "⚠️ Could not get admin token — add ADMIN_EMAIL + ADMIN_PASSWORD secrets to enable auto backend update."
            exit 0
          fi

          # Update app-version in backend
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT "${BACKEND_URL}/app-version" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"versionCode\":${BUILD_NUM},\"versionName\":\"${VERSION}\",\"forceUpdate\":false,\"apkUrl\":\"${APK_URL}\",\"releaseNotes\":\"${NOTES}\"}")

          if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 201 ]; then
            echo "✅ Backend app-version updated to v${VERSION} (code: ${BUILD_NUM})"
          else
            echo "⚠️ Backend update returned HTTP ${HTTP_STATUS} — update manually via admin panel."
          fi
